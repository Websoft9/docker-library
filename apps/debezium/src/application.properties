# Debezium Server configuration
# Edit this file to configure your source connector and sink.
# Full documentation: https://debezium.io/documentation/reference/stable/operations/debezium-server.html

# =========================================================
# Quarkus HTTP server (health endpoint at /q/health)
# =========================================================
quarkus.http.port=8080
quarkus.log.level=INFO
quarkus.log.console.json=false

# =========================================================
# Source connector
# Change connector.class to match your database:
#   PostgreSQL: io.debezium.connector.postgresql.PostgresConnector
#   MySQL:      io.debezium.connector.mysql.MySqlConnector
#   MongoDB:    io.debezium.connector.mongodb.MongoDbConnector
#   SQL Server: io.debezium.connector.sqlserver.SqlServerConnector
#   Oracle:     io.debezium.connector.oracle.OracleConnector
# =========================================================
debezium.source.connector.class=io.debezium.connector.postgresql.PostgresConnector
debezium.source.database.hostname=YOUR_DB_HOST
debezium.source.database.port=5432
debezium.source.database.user=postgres
debezium.source.database.password=YOUR_DB_PASSWORD
debezium.source.database.dbname=YOUR_DB_NAME
debezium.source.topic.prefix=debezium

# Offset storage (persisted in /debezium/data/ named volume)
debezium.source.offset.storage=org.apache.kafka.connect.storage.FileOffsetBackingStore
debezium.source.offset.storage.file.filename=/debezium/data/offsets.dat
debezium.source.offset.flush.interval.ms=0

# =========================================================
# Sink
# Available sinks: http, kafka, kinesis, pubsub, redis, rabbitmq, mqtt, nats
# =========================================================
debezium.sink.type=http
debezium.sink.http.url=http://YOUR_HTTP_ENDPOINT/events
debezium.sink.http.timeout.ms=60000
