# image: https://hub.docker.com/r/databasus/databasus
# docs: https://databasus.com/installation

services:
  databasus:
    image: $W9_REPO:$W9_VERSION
    container_name: $W9_ID
    env_file: .env
    ports:
      - $W9_HTTP_PORT_SET:$W9_HTTP_PORT
    volumes:
      - databasus:/databasus-data
    restart: unless-stopped

volumes:
  databasus:


networks:
  default:
    name: ${W9_NETWORK}
    external: true
