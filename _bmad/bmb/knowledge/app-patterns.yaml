# 统计摘要（2026-02-25 快照）
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

statistics:
  total_apps: 362
  with_w9_login: 145 # 40.1%
  with_w9_url_replace: 122 # 33.7%
  service_distribution:
    "1": 163 # 45.0%
    "2": 114 # 31.5%
    "3": 31  # 8.6%
    "4": 12  # 3.3%
    "5": 12  # 3.3%
    "6+": 30 # 8.3%
  pattern_distribution:
    solo_web: 159
    web_db: 117
    web_db_cache: 14
    shared_network: ~10
    multi_complex: 50
    standalone_db: ~8
