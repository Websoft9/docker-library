name: Gate 1a - Static Validation

on:
  pull_request:
    branches: [dev]
    paths:
      - 'apps/**'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write

jobs:
  validate:
    name: Static Validation
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'
          cache: 'pip'

      - name: Install dependencies
        run: pip install requests python-dotenv

      - name: Get changed apps
        id: changed
        run: |
          git fetch origin dev
          CHANGED=$(git diff --name-only origin/dev...HEAD \
            | grep '^apps/' | cut -d/ -f2 | sort -u | tr '\n' ',' | sed 's/,$//')
          echo "CHANGED=$CHANGED" >> $GITHUB_OUTPUT
          echo "Changed apps: $CHANGED"

      - name: Create websoft9 network
        if: steps.changed.outputs.CHANGED != ''
        run: docker network create websoft9 || true

      - name: Run validate_app.py
        if: steps.changed.outputs.CHANGED != ''
        id: validate
        run: |
          python3 build/validate_app.py "${{ steps.changed.outputs.CHANGED }}" \
            --output-json /tmp/result.json \
            --pr-comment /tmp/comment.md
        continue-on-error: true

      - name: Post PR comment
        if: steps.changed.outputs.CHANGED != ''
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const comment = fs.readFileSync('/tmp/comment.md', 'utf8');
            const marker = '<!-- validate-bot -->';
            const body = marker + '\n' + comment;

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const existing = comments.find(c => c.body.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }

      - name: Fail if validation failed
        if: steps.validate.outcome == 'failure'
        run: |
          echo "Static validation failed. See PR comment for details."
          exit 1

      - name: No apps changed
        if: steps.changed.outputs.CHANGED == ''
        run: echo "No app files changed, skipping validation."
